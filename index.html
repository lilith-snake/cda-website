    <div id="root"></div>
    <script>
      // SPA fallback: restore URL after 404.html redirect
      (function(){
        var r = sessionStorage.getItem('redirect');
        if (r) {
          sessionStorage.removeItem('redirect');
          history.replaceState(null, '', r);
        }
      })();
    </script>
