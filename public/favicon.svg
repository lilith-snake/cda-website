<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#A88D4E"/>
    </linearGradient>
  </defs>

  <!-- 外环 -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#g)" stroke-width="1.2"/>

  <!-- 内环 -->
  <circle cx="60" cy="60" r="47" fill="none" stroke="url(#g)" stroke-width="0.4" opacity="0.45"/>

  <!-- 八向交叉线 —— 象征跨次元 -->
  <g opacity="0.12" stroke="url(#g)" stroke-width="0.5">
    <line x1="60" y1="12" x2="60" y2="108"/>
    <line x1="12" y1="60" x2="108" y2="60"/>
    <line x1="26" y1="26" x2="94" y2="94"/>
    <line x1="94" y1="26" x2="26" y2="94"/>
  </g>

  <!-- CDA 字母 -->
  <text x="60" y="69" text-anchor="middle" font-family="Georgia, 'Noto Serif', serif" font-size="25" fill="url(#g)" letter-spacing="6">CDA</text>
</svg>
