<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // Extract the path after /cda-website/ and redirect to SPA with it as a query param
    var path = location.pathname.replace('/cda-website', '') || '/';
    if (location.search) path += location.search;
    if (location.hash) path += location.hash;
    location.replace('/cda-website/?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body>Redirecting...</body>
</html>
